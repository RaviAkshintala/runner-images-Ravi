name: Check pip Version

on: [push]

jobs:
  check-pip-version:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
       
    - name: Check pip version
      run: pip -V
